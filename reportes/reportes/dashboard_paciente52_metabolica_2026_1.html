<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Paciente 52 años · Dr. Ramírez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<style>
:root{
  --bg:#0a0b10;--s1:#0d0f16;--s2:#111318;
  --lime:#d4ff3a;--teal:#3defd6;--violet:#b794ff;
  --coral:#ff6b5b;--amber:#ffb547;--rose:#f472b6;
  --w:#f7f4ee;--m:rgba(247,244,238,0.48);--b:rgba(247,244,238,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--w);font-family:"Inter Tight",sans-serif;overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:999;mix-blend-mode:overlay;opacity:.28;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");}
.aw{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.au{position:absolute;border-radius:50%;filter:blur(100px);animation:drift 22s ease-in-out infinite;}
.a1{width:600px;height:600px;background:#ff6b5b;opacity:.09;top:-180px;left:-100px;}
.a2{width:650px;height:480px;background:#b794ff;opacity:.08;top:32%;right:-180px;animation-delay:-8s;}
.a3{width:480px;height:560px;background:#ffb547;opacity:.08;bottom:-80px;left:26%;animation-delay:-15s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(35px,-28px) scale(1.04);}66%{transform:translate(-28px,35px) scale(.96);}}
.pts{position:fixed;inset:0;pointer-events:none;z-index:1;}
.pt{position:absolute;border-radius:50%;opacity:0;animation:rise linear infinite;}
@keyframes rise{0%{opacity:0;transform:translateY(0) scale(0);}10%{opacity:.5;}90%{opacity:.15;}100%{opacity:0;transform:translateY(-100vh) scale(1.5);}}
.wrap{max-width:1160px;margin:0 auto;padding:0 32px;position:relative;z-index:10;}
section{padding:76px 0;}
.reveal{opacity:0;transform:translateY(34px);transition:opacity .8s ease,transform .8s ease;}
.reveal.visible{opacity:1;transform:none;}
.sep{height:1px;background:var(--b);}
/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;padding:110px 0 76px;border-bottom:1px solid var(--b);}
.eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:28px;display:flex;align-items:center;gap:14px;}
.eyebrow::before{content:"";display:inline-block;width:28px;height:1px;background:var(--amber);}
.hero-title{font-family:"Fraunces",serif;font-size:clamp(44px,6.5vw,98px);font-weight:900;line-height:.95;letter-spacing:-.03em;margin-bottom:36px;}
.acc{color:var(--amber);font-style:italic;}.acc2{color:var(--coral);}.acc3{color:var(--teal);}
.hero-meta{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;max-width:780px;}
.hml{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--m);display:block;margin-bottom:3px;}
.hmv{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--w);}
/* EY */
.ey{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--m);margin-bottom:40px;display:flex;align-items:center;gap:16px;}
.ey::after{content:"";flex:1;height:1px;background:var(--b);}
/* ALERTA URGENTE */
.urgent-card{background:rgba(255,107,91,.06);border:2px solid rgba(255,107,91,.3);border-radius:20px;padding:40px;color:var(--w);position:relative;overflow:hidden;}
.urgent-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--coral);}
.urgent-title{font-family:"Fraunces",serif;font-size:clamp(24px,3vw,40px);font-weight:900;line-height:1.05;margin-bottom:16px;color:var(--w);}
.urgent-title em{color:var(--coral);font-style:italic;}
.urgent-body{font-size:14px;line-height:1.8;color:var(--m);margin-bottom:0;}
.urgent-body strong{color:var(--w);}
/* COMPARATIVO METABÓLICO */
.comp-hdr{display:grid;grid-template-columns:1fr auto 1fr;gap:22px;align-items:center;margin-bottom:28px;}
.ch-ok{background:var(--s1);border:1px solid rgba(61,239,214,.2);border-radius:14px;padding:18px 22px;border-top:3px solid rgba(61,239,214,.5);color:var(--w);}
.ch-bad{background:var(--s1);border:1px solid rgba(255,107,91,.25);border-radius:14px;padding:18px 22px;border-top:3px solid var(--coral);color:var(--w);}
.ch-date-ok{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);margin-bottom:5px;}
.ch-date-bad{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--coral);margin-bottom:5px;}
.ch-lbl{font-family:"Fraunces",serif;font-size:16px;font-weight:700;color:var(--w);}
.ch-sub{font-size:12px;color:var(--m);margin-top:3px;}
.ch-arr{font-family:"Fraunces",serif;font-size:32px;font-weight:900;color:var(--coral);text-align:center;opacity:.5;}
/* METRIC CARDS */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:44px;}
.mcard{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:20px;color:var(--w);transition:transform .3s;}
.mcard:hover{transform:translateY(-3px);}
.mcard-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--m);margin-bottom:10px;}
.mvals{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:8px;}
.mv{text-align:center;}
.mv-num{font-family:"Fraunces",serif;font-size:30px;font-weight:900;line-height:1;}
.mv-unit{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--m);display:block;margin-top:2px;}
.mv-yr{font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.mv-ok .mv-num{color:var(--teal);}.mv-ok .mv-yr{color:var(--teal);}
.mv-bad .mv-num{color:var(--coral);}.mv-bad .mv-yr{color:var(--coral);}
.mv-warn .mv-num{color:var(--amber);}.mv-warn .mv-yr{color:var(--amber);}
.mdelta{text-align:center;}
.mdelta-n{font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:500;}
.du{color:var(--coral);}.dd{color:var(--teal);}.deq{color:var(--m);}
.rbar{height:5px;border-radius:3px;background:linear-gradient(to right,#ff6b5b 0%,#ffb547 15%,#3defd6 30%,#d4ff3a 50%,#3defd6 70%,#ffb547 85%,#ff6b5b 100%);position:relative;margin-bottom:6px;}
.rmk1{position:absolute;top:-4px;width:12px;height:12px;border-radius:50%;background:var(--teal);transform:translateX(-50%);border:2px solid var(--bg);animation:pmk 2s ease-in-out infinite;}
.rmk2{position:absolute;top:-4px;width:12px;height:12px;border-radius:50%;background:var(--coral);transform:translateX(-50%);border:2px solid var(--bg);animation:pmk 2s ease-in-out infinite .5s;}
@keyframes pmk{0%,100%{box-shadow:0 0 5px rgba(255,255,255,.4);}50%{box-shadow:0 0 12px rgba(255,255,255,.8);}}
.rl{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:8px;color:var(--m);}
.mcard-note{font-family:"Fraunces",serif;font-style:italic;font-size:11px;color:var(--m);border-top:1px solid var(--b);padding-top:8px;margin-top:4px;}
/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
.chart-card{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:26px;color:var(--w);}
.ct{font-family:"Fraunces",serif;font-size:19px;font-weight:700;margin-bottom:5px;color:var(--w);}
.cs{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--m);margin-bottom:18px;}
.ch{position:relative;height:230px;}
/* COMPOSICIÓN */
.comp-body-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.cb{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:18px;text-align:center;color:var(--w);}
.cb-icon{font-size:24px;margin-bottom:8px;display:block;}
.cb-val{font-family:"Fraunces",serif;font-size:34px;font-weight:900;line-height:1;}
.cb-unit{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--m);display:block;margin-top:2px;}
.cb-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--m);margin-top:7px;}
.cb-badge{display:inline-block;margin-top:8px;font-family:"JetBrains Mono",monospace;font-size:9px;padding:3px 9px;border-radius:12px;}
.b-coral{background:rgba(255,107,91,.1);border:1px solid rgba(255,107,91,.2);color:var(--coral);}
.b-amber{background:rgba(255,181,71,.1);border:1px solid rgba(255,181,71,.2);color:var(--amber);}
.b-teal{background:rgba(61,239,214,.1);border:1px solid rgba(61,239,214,.2);color:var(--teal);}
/* DIAGNÓSTICOS */
.diag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
.dcard{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:22px;color:var(--w);position:relative;overflow:hidden;transition:transform .3s;}
.dcard:hover{transform:translateY(-3px);}
.dcard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;}
.dc::before{background:var(--coral);}.da::before{background:var(--amber);}.dt::before{background:var(--teal);}.dv::before{background:var(--violet);}
.dcard-icon{font-size:26px;margin-bottom:10px;display:block;}
.dcard-title{font-family:"Fraunces",serif;font-size:16px;font-weight:700;margin-bottom:7px;}
.dc .dcard-title{color:var(--coral);}.da .dcard-title{color:var(--amber);}.dt .dcard-title{color:var(--teal);}.dv .dcard-title{color:var(--violet);}
.dcard-body{font-size:13px;line-height:1.6;color:var(--m);}
.dcard-body strong{color:var(--w);}
.dcard-badge{display:inline-block;margin-top:10px;font-family:"JetBrains Mono",monospace;font-size:9px;padding:3px 9px;border-radius:12px;}
.badge-urgent{background:rgba(255,107,91,.12);border:1px solid rgba(255,107,91,.25);color:var(--coral);}
.badge-watch{background:rgba(255,181,71,.1);border:1px solid rgba(255,181,71,.2);color:var(--amber);}
/* MENSAJE PACIENTE */
.msg-card{background:var(--s1);border:1px solid rgba(212,255,58,.15);border-radius:20px;padding:44px;color:var(--w);}
.msg-title{font-family:"Fraunces",serif;font-size:clamp(24px,3vw,40px);font-weight:900;line-height:1.05;margin-bottom:18px;color:var(--w);}
.msg-title em{color:var(--lime);font-style:italic;}
.msg-body{font-size:14px;line-height:1.85;color:var(--m);margin-bottom:14px;}
.msg-body strong{color:var(--w);}
.msg-nota{background:var(--s2);border:1px solid rgba(212,255,58,.12);border-radius:12px;padding:20px;margin-top:24px;}
.msg-nota p{font-size:13px;line-height:1.7;color:var(--m);}
.msg-nota strong{color:var(--lime);}
/* REFERENCIA */
.ref-card{background:rgba(183,148,255,.05);border:1px solid rgba(183,148,255,.2);border-radius:16px;padding:36px;color:var(--w);}
.ref-title{font-family:"Fraunces",serif;font-size:22px;font-weight:700;margin-bottom:14px;color:var(--violet);}
.ref-body{font-size:14px;line-height:1.8;color:var(--m);margin-bottom:18px;}
.ref-body strong{color:var(--w);}
.ref-list{list-style:none;display:flex;flex-direction:column;gap:9px;}
.ref-list li{font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.6;color:var(--m);display:flex;gap:9px;align-items:flex-start;}
.ref-list li::before{content:"·";color:var(--violet);flex-shrink:0;font-size:16px;line-height:1.2;}
.ref-list li span{color:rgba(247,244,238,.82);}
/* ESTUDIOS */
.est-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:11px;}
.ecard{background:var(--s1);border:1px solid var(--b);border-radius:11px;padding:16px;color:var(--w);transition:border-color .3s;}
.ecard:hover{border-color:rgba(183,148,255,.3);}
.en{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);margin-bottom:6px;}
.er{font-size:12px;line-height:1.5;color:var(--m);}
/* CHECKLIST */
.ck-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
.ck-col{background:var(--s2);border:1px solid var(--b);border-radius:14px;padding:22px;}
.ckh{font-family:"Fraunces",serif;font-size:20px;font-weight:700;margin-bottom:14px;color:var(--w);}
.cki{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px;cursor:pointer;}
.ckc{width:20px;height:20px;border-radius:50%;border:2px solid var(--b);flex-shrink:0;margin-top:2px;transition:all .3s;display:flex;align-items:center;justify-content:center;}
.cki.checked .ckc{background:var(--amber);border-color:var(--amber);}
.cki.checked .ckc::after{content:"✓";font-size:10px;color:var(--bg);font-weight:700;}
.ckt{font-size:13px;line-height:1.5;color:rgba(247,244,238,.78);transition:color .3s;}
.cki.checked .ckt{color:var(--m);text-decoration:line-through;}
/* FOOTER */
footer{border-top:1px solid var(--b);padding:52px 0 70px;text-align:center;}
.fq{font-family:"Fraunces",serif;font-size:clamp(20px,3vw,34px);font-style:italic;font-weight:300;color:rgba(247,244,238,.62);max-width:720px;margin:0 auto 12px;line-height:1.4;}
.fq em{color:var(--teal);}
.fb{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:16px;}
.fd{max-width:560px;margin:0 auto;font-size:11px;line-height:1.7;color:rgba(247,244,238,.28);padding:12px;border:1px solid rgba(255,181,71,.15);border-radius:8px;background:rgba(255,181,71,.02);}
.fdl{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);display:block;margin-bottom:6px;}
.mr{animation:mrot 40s linear infinite;transform-origin:center;}
.mrs{animation:mrot 80s linear infinite;transform-origin:center;}
.mp{animation:mpls 3s ease-in-out infinite;}
.mw{animation:mwgl 6s ease-in-out infinite;}
@keyframes mrot{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes mpls{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
@keyframes mwgl{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@media(max-width:768px){.hero-meta,.comp-hdr,.chart-grid,.ck-grid{grid-template-columns:1fr;}.ch-arr{display:none;}}
</style>
</head>
<body>
<div class="aw"><div class="au a1"></div><div class="au a2"></div><div class="au a3"></div></div>
<div class="pts" id="pts"></div>

<!-- HERO -->
<section class="hero">
<div class="wrap">
<div style="display:grid;grid-template-columns:1fr auto;gap:36px;align-items:center;">
<div>
<div class="eyebrow reveal">Dr. Miguel Ángel Ramírez y Ramírez · MUJER 360° · Referencia a Especialidad</div>
<h1 class="hero-title reveal">El problema<br>principal <span class="acc">hoy</span><br>no es solo<br><span class="acc2">la menopausia.</span></h1>
<div class="hero-meta reveal">
<div><span class="hml">Paciente</span><span class="hmv">52 años · F</span></div>
<div><span class="hml">Talla / Peso</span><span class="hmv">164 cm · 85.8 kg</span></div>
<div><span class="hml">IMC Jun 2026</span><span class="hmv" style="color:var(--coral)">31.9 kg/m²</span></div>
<div><span class="hml">HbA1c Jun 2026</span><span class="hmv" style="color:var(--coral)">7.0% ⚠️</span></div>
<div><span class="hml">TA</span><span class="hmv" style="color:var(--coral)">166/94 mmHg</span></div>
</div>
</div>
<div style="opacity:.42;flex-shrink:0;">
<svg width="170" height="170" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,107,91,.15)" stroke-width="1"/>
<circle class="mrs" cx="100" cy="100" r="80" fill="none" stroke="rgba(255,181,71,.38)" stroke-width="1" stroke-dasharray="7 14"/>
<circle class="mr" cx="100" cy="100" r="58" fill="none" stroke="rgba(183,148,255,.18)" stroke-width="1" stroke-dasharray="4 8"/>
<text x="100" y="92" text-anchor="middle" font-family="Fraunces,serif" font-size="13" font-weight="900" fill="rgba(255,181,71,.7)" font-style="italic">MUJER</text>
<text x="100" y="114" text-anchor="middle" font-family="Fraunces,serif" font-size="28" font-weight="900" fill="rgba(61,239,214,.82)" font-style="italic">360°</text>
</svg>
</div>
</div>
</div>
</section>

<!-- MENSAJE URGENTE -->
<section style="background:var(--s1);padding:60px 0;">
<div class="wrap">
<div class="urgent-card reveal">
<h2 class="urgent-title">⚠️ Hay datos que<br>requieren <em>atención ahora.</em></h2>
<p class="urgent-body">Tus estudios muestran que el problema principal en este momento no es solo la menopausia. Hay <strong>resistencia importante a la insulina y hemoglobina glucosilada en rango de diabetes (7.0%)</strong>, además de <strong>presión arterial elevada (166/94 mmHg)</strong> y <strong>alteración en pruebas del hígado</strong>, probablemente relacionada con metabolismo/hígado graso.</p>
<p class="urgent-body" style="margin-top:12px;">Aunque estás haciendo dieta y ejercicio, tu cuerpo no está respondiendo como esperaríamos con metformina 1000 mg. Por eso es importante que te valore <strong>Endocrinología / Medicina Interna</strong> para ajustar tratamiento.</p>
</div>
</div>
</section>

<!-- 01 COMPARATIVO METABÓLICO -->
<div class="sep"></div>
<section>
<div class="wrap">
<div class="ey reveal">01 · Comparativo Metabólico · Ago 2025 → Jun 2026</div>
<div class="comp-hdr reveal">
<div class="ch-ok">
<div class="ch-date-ok">Agosto 2025 · Línea base</div>
<div class="ch-lbl">Mejor control metabólico</div>
<div class="ch-sub">HbA1c 5.9% · Glucosa 102 · Insulina 22.1</div>
</div>
<div class="ch-arr">→</div>
<div class="ch-bad">
<div class="ch-date-bad">Junio 2026 · Deterioro documentado</div>
<div class="ch-lbl">Alarma metabólica activa</div>
<div class="ch-sub">HbA1c 7.0% · Glucosa ~116 · Insulina 63.7</div>
</div>
</div>

<div class="metric-grid">
<div class="mcard reveal">
<div class="mcard-lbl">HEMOGLOBINA GLUCOSILADA (HbA1c)</div>
<div class="mvals">
<div class="mv mv-ok"><div class="mv-num">5.9</div><span class="mv-unit">%</span><div class="mv-yr">Ago 2025</div></div>
<div class="mdelta"><div class="mdelta-n du">+1.1</div><div style="font-family:JetBrains Mono,monospace;font-size:8px;color:var(--m)">%</div></div>
<div class="mv mv-bad"><div class="mv-num">7.0</div><span class="mv-unit">%</span><div class="mv-yr">Jun 2026</div></div>
</div>
<div class="rbar"><div class="rmk1" style="left:26%"></div><div class="rmk2" style="left:60%"></div></div>
<div class="rl"><span>&lt;5.7</span><span>PreD 5.7–6.4</span><span>DM ≥6.5</span></div>
<div class="mcard-note">Pasó de prediabetes a zona de diabetes en 10 meses. Señal de alarma mayor.</div>
</div>

<div class="mcard reveal">
<div class="mcard-lbl">INSULINA BASAL</div>
<div class="mvals">
<div class="mv mv-ok"><div class="mv-num">22.1</div><span class="mv-unit">mU/L</span><div class="mv-yr">Ago 2025</div></div>
<div class="mdelta"><div class="mdelta-n du">+41.6</div><div style="font-family:JetBrains Mono,monospace;font-size:8px;color:var(--m)">mU/L</div></div>
<div class="mv mv-bad"><div class="mv-num">63.7</div><span class="mv-unit">mU/L</span><div class="mv-yr">Jun 2026</div></div>
</div>
